name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      windows:
        description: 'Build Windows'
        type: boolean
        default: false
      linux:
        description: 'Build Linux'
        type: boolean
        default: false
      macos:
        description: 'Build macOS'
        type: boolean
        default: false
      release_tag:
        description: 'Update release tag (e.g. v1.0)'
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go backend: always build all 3 (fast, ~30s) ──
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            ext: .exe
            target: windows
          - goos: linux
            ext: ''
            target: linux
          - goos: darwin
            ext: ''
            target: macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum
      - run: |
          cd backend
          GOOS=${{ matrix.goos }} GOARCH=amd64 \
            go build -ldflags "-s -w" -o xjtu-housing-genius${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: backend/xjtu-housing-genius${{ matrix.ext }}

  # ── Windows ──
  build-windows:
    needs: build-backend
    if: ${{ github.event_name == 'push' || github.event.inputs.windows == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
      - uses: actions/download-artifact@v4
        with: { name: backend-windows, path: backend/ }
      - name: Build Flutter
        run: cd frontend && flutter build windows --release
      - name: Bundle portable zip
        shell: pwsh
        run: |
          $bundle = "bundle"; mkdir $bundle
          Copy-Item "frontend\build\windows\x64\runner\Release\*" $bundle -Recurse
          Copy-Item "backend\xjtu-housing-genius.exe" $bundle
          Compress-Archive -Path "$bundle\*" -DestinationPath "XJTU-Housing-Genius-windows-x64.zip"
      - name: Build installer
        shell: bash
        run: iscc scripts/setupconfig.iss
      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Housing-Genius-windows-x64
          path: |
            XJTU-Housing-Genius-windows-x64.zip
            dist/XJTU-Housing-Genius-Setup-v*.exe

  # ── Linux ──
  build-linux:
    needs: build-backend
    if: ${{ github.event_name == 'push' || github.event.inputs.linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.44.1' }
      - run: sudo apt-get update -qq && sudo apt-get install -y cmake clang pkg-config libgtk-3-dev liblzma-dev
      - uses: actions/download-artifact@v4
        with: { name: backend-linux, path: backend/ }
      - run: chmod +x backend/xjtu-housing-genius
      - name: Build Flutter
        run: cd frontend && flutter build linux --release
      - name: Package .deb
        run: |
          VER="${{ github.ref_name }}"; VER="${VER#v}"
          [ "$VER" = "refs/heads/main" ] && VER="dev"
          INSTALL_DIR="pkg/opt/xjtu-housing-genius"
          mkdir -p "$INSTALL_DIR" pkg/DEBIAN
          cp -r frontend/build/linux/x64/release/bundle/* "$INSTALL_DIR/"
          cp backend/xjtu-housing-genius "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/xjtu_housing_genius" "$INSTALL_DIR/xjtu-housing-genius"
          mkdir -p pkg/usr/share/applications pkg/usr/share/icons/hicolor/256x256/apps
          cat > pkg/usr/share/applications/xjtu-housing-genius.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=XJTU Housing Genius
          Name[zh_CN]=西安交通大学抢宿舍助手
          Comment=XJTU Housing Selection Tool
          Exec=/opt/xjtu-housing-genius/xjtu_housing_genius
          Icon=xjtu-housing-genius
          Categories=Education;
          Terminal=false
          EOF
          cp frontend/linux/runner/resources/app_icon.png pkg/usr/share/icons/hicolor/256x256/apps/xjtu-housing-genius.png
          cat > pkg/DEBIAN/prerm << 'PRERM'
          #!/bin/sh
          pkill -x -f "/opt/xjtu-housing-genius/xjtu_housing_genius" 2>/dev/null || true
          pkill -x -f "/opt/xjtu-housing-genius/xjtu-housing-genius" 2>/dev/null || true
          exit 0
          PRERM
          chmod +x pkg/DEBIAN/prerm
          cat > pkg/DEBIAN/control << EOF
          Package: xjtu-housing-genius
          Version: ${VER:-1.0}
          Architecture: amd64
          Maintainer: Hz
          Description: XJTU Housing Genius - housing selection tool
           Built with Flutter + Go backend.
          Depends: libgtk-3-0
          EOF
          dpkg-deb --build pkg "XJTU-Housing-Genius-linux-x64.deb"
          cd "$INSTALL_DIR" && tar czf "../../../../XJTU-Housing-Genius-linux-x64.tar.gz" *
      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Housing-Genius-linux-x64
          path: |
            XJTU-Housing-Genius-linux-x64.deb
            XJTU-Housing-Genius-linux-x64.tar.gz

  # ── macOS ──
  build-macos:
    needs: build-backend
    if: ${{ github.event_name == 'push' || github.event.inputs.macos == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.44.1' }
      - uses: actions/download-artifact@v4
        with: { name: backend-macos, path: backend/ }
      - run: chmod +x backend/xjtu-housing-genius
      - name: Build Flutter
        run: cd frontend && flutter build macos --release
      - name: Package .dmg
        run: |
          app="frontend/build/macos/Build/Products/Release/xjtu_housing_genius.app"
          cp backend/xjtu-housing-genius "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/xjtu-housing-genius"
          mkdir dmg
          cp -r "$app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "XJTU Housing Genius" -srcfolder dmg -ov -format UDZO "XJTU-Housing-Genius-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Housing-Genius-macos
          path: XJTU-Housing-Genius-macos.dmg

  # ── Release ──
  release:
    needs: [build-windows, build-linux, build-macos]
    if: ${{ !cancelled() && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: XJTU-Housing-Genius-*
          path: artifacts/
          merge-multiple: true

      - name: Collect assets
        run: |
          find artifacts -type f -exec mv {} ./ \;
          rm -rf artifacts
          ls -lh

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: |
            XJTU-Housing-Genius-windows-x64.zip
            XJTU-Housing-Genius-Setup-v*.exe
            XJTU-Housing-Genius-linux-x64.deb
            XJTU-Housing-Genius-linux-x64.tar.gz
            XJTU-Housing-Genius-macos.dmg
          fail_on_unmatched_files: false
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
